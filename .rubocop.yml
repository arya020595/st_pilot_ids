# RuboCop configuration
# Enables all new cops by default and explicitly opts in to recently added ones.
# Adjust individual cops as needed for project style.

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.4
  DisplayCopNames: true
  SuggestExtensions: false
  Exclude:
    - "db/schema.rb"
    - "bin/*"
    - "node_modules/**/*"
    - "vendor/**/*"
    - "tmp/**/*"

# Gemspec related new cops
Gemspec/AddRuntimeDependency:
  Enabled: true
Gemspec/AttributeAssignment:
  Enabled: true
Gemspec/DeprecatedAttributeAssignment:
  Enabled: true
Gemspec/DevelopmentDependencies:
  Enabled: true
Gemspec/RequireMFA:
  Enabled: true

# Layout new cops
Layout/EmptyLinesAfterModuleInclusion:
  Enabled: true
Layout/LineContinuationLeadingSpace:
  Enabled: true
Layout/LineContinuationSpacing:
  Enabled: true
Layout/LineEndStringConcatenationIndentation:
  Enabled: true
Layout/SpaceBeforeBrackets:
  Enabled: true

# Lint new cops
Lint/AmbiguousAssignment:
  Enabled: true
Lint/AmbiguousOperatorPrecedence:
  Enabled: true
Lint/UnusedMethodArgument:
  Enabled: true
  AutoCorrect: true
  AllowUnusedKeywordArguments: false
Lint/UnusedBlockArgument:
  Enabled: true
  AutoCorrect: true
Lint/UselessAssignment:
  Enabled: true

# Style new cops - Remove unused and redundant code
Style/RedundantConstantBase:
  Enabled: true
Style/RedundantReturn:
  Enabled: true
  AutoCorrect: true
Style/RedundantSelf:
  Enabled: true
  AutoCorrect: true
Style/RedundantBegin:
  Enabled: true
  AutoCorrect: true
Style/RedundantParentheses:
  Enabled: true
  AutoCorrect: true
Style/RedundantCondition:
  Enabled: true
  AutoCorrect: true

# Documentation: disabled project-wide — inline comments preferred over class-level docs
Style/Documentation:
  Enabled: false

# String literals: double quotes are allowed — consistency over strictness
Style/StringLiterals:
  Enabled: false

# Naming: has_* prefix is idiomatic Ruby for permission checks; renaming breaks the permission API
Naming/PredicatePrefix:
  Enabled: false

# Safe navigation: allow longer chains in policy/helper code
Style/SafeNavigationChainLength:
  Enabled: false

# Numeric literals: thousands separator not required
Style/NumericLiterals:
  Enabled: false

# Word arrays: %w is optional; explicit arrays are clearer in seeds/config
Style/WordArray:
  Enabled: false

# Metrics tuning (relaxed for current codebase; tighten later)
Metrics/MethodLength:
  Max: 40
  Exclude:
    - "db/migrate/**/*"
    - "lib/tasks/**/*"
    - "db/seeds/**/*"
    - "test/**/*"

Metrics/BlockLength:
  Max: 50
  Exclude:
    - "config/routes.rb"
    - "config/environments/**/*"
    - "config/initializers/**/*"
    - "db/migrate/**/*"
    - "lib/tasks/**/*"
    - "db/seeds/**/*"
    - "test/**/*"

Metrics/ParameterLists:
  Max: 8

Metrics/AbcSize:
  Max: 35
  Exclude:
    - "db/migrate/**/*"
    - "lib/tasks/**/*"
    - "db/seeds/**/*"
    - "test/**/*"

Metrics/ClassLength:
  Exclude:
    - "test/**/*"

Style/OneClassPerFile:
  Exclude:
    - "test/test_helper.rb"
