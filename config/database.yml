# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "root" } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>

development:
  primary:
    <<: *default
    database: <%= ENV.fetch("DATABASE_NAME") { "st_pilot_ids_development" } %>
  cache:
    <<: *default
    database: st_pilot_ids_development_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: st_pilot_ids_development_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: st_pilot_ids_development_cable
    migrations_paths: db/cable_migrate

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  primary:
    <<: *default
    database: <%= ENV.fetch("DATABASE_TEST_NAME") { "st_pilot_ids_test" } %>
  cache:
    <<: *default
    database: st_pilot_ids_test_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: st_pilot_ids_test_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: st_pilot_ids_test_cable
    migrations_paths: db/cable_migrate

production:
  primary:
    url: <%= ENV.fetch("DATABASE_URL") { "postgresql://postgres:password@localhost:5432/st_pilot_ids_production" } %>
  cache:
    url: <%= ENV.fetch("CACHE_DATABASE_URL") { ENV.fetch("DATABASE_URL") { "postgresql://postgres:password@localhost:5432/st_pilot_ids_production_cache" } } %>
    migrations_paths: db/cache_migrate
  queue:
    url: <%= ENV.fetch("QUEUE_DATABASE_URL") { ENV.fetch("DATABASE_URL") { "postgresql://postgres:password@localhost:5432/st_pilot_ids_production_queue" } } %>
    migrations_paths: db/queue_migrate
  cable:
    url: <%= ENV.fetch("CABLE_DATABASE_URL") { ENV.fetch("DATABASE_URL") { "postgresql://postgres:password@localhost:5432/st_pilot_ids_production_cable" } } %>
    migrations_paths: db/cable_migrate
